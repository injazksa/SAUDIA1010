<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غير متصل | مكتب تأشيرات السعودية</title>
    <meta name="robots" content="noindex, follow">
    <link rel="icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body{margin:0;font-family:'Alexandria',system-ui,sans-serif;background:linear-gradient(135deg,#1B2A41 0%,#121C2B 100%);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;text-align:center}
        .card{max-width:520px;background:rgba(255,255,255,.05);border:1px solid rgba(201,163,94,.3);border-radius:24px;padding:48px 32px;backdrop-filter:blur(12px)}
        .icon{font-size:72px;color:#C9A35E;margin-bottom:20px}
        h1{font-size:28px;margin:0 0 12px;color:#C9A35E}
        p{font-size:16px;line-height:1.8;color:#d4d4d4;margin:0 0 28px}
        .btn{display:inline-flex;align-items:center;gap:10px;background:#C9A35E;color:#1B2A41;padding:14px 28px;border-radius:12px;font-weight:700;text-decoration:none;font-size:16px;transition:transform .2s}
        .btn:hover{transform:translateY(-2px)}
        .hint{margin-top:20px;font-size:14px;color:#9ca3af}
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📡</div>
        <h1>لا يوجد اتصال بالإنترنت</h1>
        <p>عذراً، يبدو أنك غير متصل حالياً. تحقق من اتصالك بالإنترنت ثم حاول مرة أخرى.</p>
        <a href="/" class="btn" onclick="location.reload();return false;">إعادة المحاولة</a>
        <div class="hint">📞 تواصل معنا مباشرة: 0789881009</div>
    </div>
    <script>
        // إعادة تحميل تلقائي عند عودة الاتصال
        window.addEventListener('online', () => location.reload());
    </script>
</body>
</html>
