# Netlify Configuration for Saudi Visa Website
# Static HTML/CSS/JS Website

[build]
  publish = "frontend/public"
  
[build.environment]
  NODE_VERSION = "18"

# =============================================
# SECURITY HEADERS - All pages
# =============================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://identity.netlify.com https://cdn.tailwindcss.com https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://unpkg.com https://cdn.jsdelivr.net https://cdn.tailwindcss.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.netlify.com https://*.netlify.app https://identity.netlify.com https://www.google-analytics.com; frame-src 'self' https://www.google.com https://maps.google.com; object-src 'none'; base-uri 'self'; form-action 'self' https://formspree.io"
    X-DNS-Prefetch-Control = "on"
    X-Download-Options = "noopen"
    X-Permitted-Cross-Domain-Policies = "none"

# =============================================
# BLOCK ACCESS TO SENSITIVE FILES
# =============================================
[[headers]]
  for = "/.env"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/.git/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# =============================================
# CACHE HEADERS - Static Assets
# =============================================
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"
    
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
    
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=600"
    X-Robots-Tag = "noindex"

# =============================================
# BLOCK ACCESS TO INTERNAL/CONFIG FILES
# =============================================

# ALLOW: SEO files first (before blocking wildcards)
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = true

[[redirects]]
  from = "/manifest.json"
  to = "/manifest.json"
  status = 200
  force = true

[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.ico"
  status = 200
  force = true

# BLOCK: Sensitive files
[[redirects]]
  from = "/.env"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.git/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.gitignore"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/config.yml"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/project-structure.txt"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/DEPLOY.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/README.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/professions_processed.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/professions_updated.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/design_guidelines.json"
  to = "/404.html"
  status = 404
  force = true

# =============================================
# CLEAN URL REDIRECTS
# =============================================
[[redirects]]
  from = "/professions"
  to = "/professions.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 200

[[redirects]]
  from = "/calculator"
  to = "/calculator.html"
  status = 200

[[redirects]]
  from = "/certificates"
  to = "/certificates.html"
  status = 200

[[redirects]]
  from = "/professional"
  to = "/professional.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/disclaimer"
  to = "/disclaimer.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/work-visa"
  to = "/work-visa.html"
  status = 200

# 404 page - catch all unknown routes
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
  force = false
